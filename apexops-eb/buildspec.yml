version: 0.2

phases:
  install:
    runtime-versions:
      php: 8.2
    commands:
      - echo Installing dependencies...

  pre_build:
    commands:
      - echo Pre-build started on `date`
      - echo Validating PHP files...
      find . -name "*.php" -exec php -l {} \; || exit 1

  build:
    commands:
      - echo Build started on `date`
      - echo Packaging ApexOps application...

  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  exclude-paths:
    - '.git/**'
    - 'README.md'
  name: apexops-artifact

cache:
  paths: []
